<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVI — Документы</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0b0a12;
    color: #f3f0fa;
    font: 16px/1.6 -apple-system, "Segoe UI", sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 40px 20px;
  }
  .wrap { max-width: 480px; width: 100%; }
  .logo { font-size: 13px; letter-spacing: .3em; text-transform: uppercase; color: #ff3db5; margin-bottom: 32px; font-weight: 700; }
  h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .sub { color: #9c93b3; font-size: 14px; margin-bottom: 40px; }
  .links { display: flex; flex-direction: column; gap: 12px; }
  a {
    display: flex; align-items: center; justify-content: space-between;
    background: #16131f; border: 1px solid #272235; border-radius: 14px;
    padding: 18px 22px; text-decoration: none; color: #f3f0fa;
    transition: border-color .2s;
  }
  a:hover { border-color: #8b5cff; }
  .link-title { font-weight: 600; font-size: 15px; }
  .link-sub { font-size: 12px; color: #9c93b3; margin-top: 2px; }
  .arrow { color: #8b5cff; font-size: 20px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">VIVI AI OFFICE</div>
  <h1>Документы</h1>
  <p class="sub">Выбери нужный раздел</p>
  <div class="links">
    <a href="roadmap-client.html">
      <div>
        <div class="link-title">Дорожная карта — Клиент</div>
        <div class="link-sub">Для клиентов VIVI VIP</div>
      </div>
      <span class="arrow">→</span>
    </a>
    <a href="roadmap-worker.html">
      <div>
        <div class="link-title">Дорожная карта — Рабочий</div>
        <div class="link-sub">Только для внутреннего использования</div>
      </div>
      <span class="arrow">→</span>
    </a>
    <a href="vivi-presentation.html">
      <div>
        <div class="link-title">Презентация VIVI</div>
        <div class="link-sub">9 слайдов о продукте</div>
      </div>
      <span class="arrow">→</span>
    </a>
    <a href="vip-roadmap.html">
      <div>
        <div class="link-title">VIP Roadmap</div>
        <div class="link-sub">Оригинальная карта</div>
      </div>
      <span class="arrow">→</span>
    </a>
  </div>
</div>
</body>
</html>
